<header class="shell-header">
  <div class="shell-header__brand">
    <span class="shell-header__mark" aria-hidden="true">GM</span>
    <span class="shell-header__title">Gallery Manager</span>
  </div>
  <nav class="shell-nav" aria-label="Main navigation">
    <a routerLink="/artworks" routerLinkActive="is-active">Artworks</a>

</main>
